<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --maroon: #6e1620; --dark-grey: #2b2b2b; --gold: #b38b59; --bg-color: #f4f4f4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; padding: 15px; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; background-color: #fcfcfc; padding: 25px 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 120px; margin: 0 auto 10px; display: block; }
        .title-1 { color: var(--maroon); font-size: 3rem; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .title-2 { color: var(--dark-grey); font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; }
        .date-badge { background-color: var(--maroon); color: white; display: inline-block; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; margin-bottom: 25px; }
        .card { display: flex; border: 2px solid var(--maroon); border-radius: 12px; margin-bottom: 15px; background: white; overflow: hidden; text-align: left; }
        .card-time { background: var(--maroon); color: white; min-width: 90px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; text-align: center; }
        .card-time i { font-size: 1.5rem; margin-bottom: 5px; }
        .card-content { padding: 12px; flex: 1; min-width: 0; }
        .location { color: var(--maroon); font-weight: 900; font-size: 0.95rem; display: flex; gap: 5px; margin-bottom: 5px; }
        .map-link a { color: #333; font-size: 0.8rem; word-break: break-all; }
        .divider { border: none; border-top: 1px solid var(--gold); margin: 8px 0; }
        .info { display: flex; gap: 8px; margin-bottom: 5px; font-size: 0.85rem; color: #333; line-height: 1.2; }
        .info i { color: var(--maroon); width: 15px; flex-shrink: 0; text-align: center; }
        .footer { margin-top: 25px; font-size: 1.5rem; font-weight: 900; font-style: italic; }
    </style>
</head>
<body>

    <div class="container" id="agenda-container">
        </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN RÁPIDA (EDITA AQUÍ)
        // ==========================================
        const CONFIG = {
            logoUrl: "logo-d4t.png", // Nombre exacto de tu imagen en GitHub
            titulo1: "AGENDA",
            titulo2: "DE REUNIONES",
            fecha: "DOMINGO 03 DE ENERO DEL 2026",
            hashtag1: "#Defensores",
            hashtag2: "DeLa4T"
        };

        const REUNIONES = [
            {
                hora: "10:00 a.m. a<br>7:00 p.m.",
                lugar: "parque chido",
                mapa: "https://maps.app.goo.gl/MMFGXqe7MrG5yEUD6",
                organizadores: "salvador, esteba dido",
                asistentes: "240 personas XD"
            },
            {
                hora: "7:00 a<br>8:00 p.m.",
                lugar: "SECCIÓN SEGUNDA, GUADALUPE VICTORIA",
                mapa: "https://maps.app.goo.gl/Yg9yBpLLpiPYmWjV8",
                organizadores: "Edgar Huantes",
                asistentes: "40 personas"
            }
            // Puedes agregar más reuniones copiando y pegando el bloque de arriba { ... }
        ];

        // ==========================================
        // MOTOR DE CARGA (NO TOCAR)
        // ==========================================
        function renderAgenda() {
            const root = document.getElementById('agenda-container');
            let html = `
                <img src="${CONFIG.logoUrl}" alt="Logo" class="logo">
                <div class="title-1">${CONFIG.titulo1}</div>
                <div class="title-2">${CONFIG.titulo2}</div>
                <div class="date-badge"><i class="far fa-calendar-alt"></i> ${CONFIG.fecha}</div>
            `;

            REUNIONES.forEach(r => {
                html += `
                    <div class="card">
                        <div class="card-time"><i class="far fa-clock"></i><span>${r.hora}</span></div>
                        <div class="card-content">
                            <div class="location"><i class="fas fa-map-marker-alt"></i><span>${r.lugar}</span></div>
                            <div class="map-link">
                                <i class="fas fa-map-marked-alt" style="color:#4285F4"></i>
                                <a href="${r.mapa}" target="_blank">${r.mapa}</a>
                            </div>
                            <hr class="divider">
                            <div class="info"><i class="fas fa-users"></i><div><strong>ORGANIZA:</strong> ${r.organizadores}</div></div>
                            <div class="info"><i class="fas fa-user"></i><div><strong>ASISTENTES:</strong> ${r.asistentes}</div></div>
                        </div>
                    </div>
                `;
            });

            html += `<div class="footer"><span style="color:var(--maroon)">${CONFIG.hashtag1}</span><span style="color:var(--dark-grey)">${CONFIG.hashtag2}</span></div>`;
            root.innerHTML = html;
        }

        renderAgenda();
    </script>
</body>
</html>
